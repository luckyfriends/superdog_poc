<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SURVIVOR</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#000; display:flex; justify-content:center; align-items:center; min-height:100vh; overflow:hidden; }
canvas { cursor:crosshair; max-width:100vw; max-height:100vh; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
// ── SETUP ──────────────────────────────────────────────────────────────────
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = 800, H = 600;
canvas.width = W; canvas.height = H;

// Pre-render scanline overlay
const scanOC = document.createElement('canvas');
scanOC.width = W; scanOC.height = H;
const sctx = scanOC.getContext('2d');
for (let y = 0; y < H; y += 4) {
  sctx.fillStyle = 'rgba(0,0,0,0.13)';
  sctx.fillRect(0, y, W, 2);
}

// ── CONSTANTS ──────────────────────────────────────────────────────────────
const PLAYER_SPEED  = 200;
const PLAYER_R      = 14;
const GRUNT_R       = 12;
const CHARGER_R     = 11;
const TANK_R        = 18;
const BULLET_SPEED  = 520;
const BULLET_R      = 4;
const FIRE_CD       = 0.18;
const INV_TIME      = 1.5;
const COMPLETE_WAIT = 2.8;
const SPAWN_MARGIN  = 40;

// ── STATE ──────────────────────────────────────────────────────────────────
let gs = 'MENU'; // MENU | PLAYING | LEVEL_COMPLETE | GAME_OVER | WIN
let level = 1;
let score = 0;
let hiScore = 0;
let completionTimer = 0;
let shakeTimer = 0;

let player, enemies, bullets, particles, flashes;
let spawnQueue = [];
let spawnTimer = 0;
let spawnInterval = 1.5;
let maxOnScreen = 6;
let killedEnemies = 0;
let totalEnemies = 0;

const keys = {};
const mouse = { x: W/2, y: H/2 };
let mouseHeld = false;

const LEVEL_DEFS = [
  null,
  { grunts:12, chargers:0,  tanks:0, maxOnScreen:6,  spawnInterval:1.5 },
  { grunts:20, chargers:8,  tanks:0, maxOnScreen:8,  spawnInterval:1.1 },
  { grunts:15, chargers:10, tanks:5, maxOnScreen:10, spawnInterval:0.9 }
];

// ── FACTORIES ──────────────────────────────────────────────────────────────
function createPlayer() {
  return {
    x: W/2, y: H/2, angle: 0,
    hp: 3, maxHp: 3,
    invTimer: 0, fireCooldown: 0,
    walkCycle: 0, moving: false
  };
}

function spawnEnemy(type) {
  const side = Math.floor(Math.random() * 4);
  let x, y;
  if      (side === 0) { x = Math.random()*W;      y = -SPAWN_MARGIN; }
  else if (side === 1) { x = W + SPAWN_MARGIN;      y = Math.random()*H; }
  else if (side === 2) { x = Math.random()*W;      y = H + SPAWN_MARGIN; }
  else                 { x = -SPAWN_MARGIN;          y = Math.random()*H; }

  const base = {
    grunt:   { r:GRUNT_R,   hp:1, maxHp:1, speed:80,  score:10 },
    charger: { r:CHARGER_R, hp:1, maxHp:1, speed:100, score:25 },
    tank:    { r:TANK_R,    hp:3, maxHp:3, speed:48,  score:60 }
  }[type];

  return {
    ...base, x, y, type,
    angle: 0, walkCycle: Math.random() * Math.PI * 2,
    hitTimer: 0, charging: false
  };
}

function fireBullet() {
  const angle = Math.atan2(mouse.y - player.y, mouse.x - player.x);
  const ox = Math.cos(angle) * (PLAYER_R + 22);
  const oy = Math.sin(angle) * (PLAYER_R + 22);
  bullets.push({ x: player.x+ox, y: player.y+oy,
    vx: Math.cos(angle)*BULLET_SPEED, vy: Math.sin(angle)*BULLET_SPEED,
    life: 1.6 });
  flashes.push({ x: player.x+ox, y: player.y+oy, life: 0.07 });
  player.fireCooldown = FIRE_CD;
}

function burst(x, y, color, n) {
  for (let i = 0; i < n; i++) {
    const a = Math.random() * Math.PI * 2;
    const sp = 60 + Math.random() * 150;
    const life = 0.35 + Math.random() * 0.35;
    particles.push({ x, y,
      vx: Math.cos(a)*sp, vy: Math.sin(a)*sp,
      r: 2 + Math.random()*3, life, maxLife: life, color });
  }
}

// ── LEVELS ─────────────────────────────────────────────────────────────────
function loadLevel(n) {
  const def = LEVEL_DEFS[n];
  spawnQueue = [];
  for (let i = 0; i < def.grunts;   i++) spawnQueue.push('grunt');
  for (let i = 0; i < def.chargers; i++) spawnQueue.push('charger');
  for (let i = 0; i < def.tanks;    i++) spawnQueue.push('tank');
  // shuffle
  for (let i = spawnQueue.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i+1));
    [spawnQueue[i], spawnQueue[j]] = [spawnQueue[j], spawnQueue[i]];
  }
  maxOnScreen = def.maxOnScreen;
  spawnInterval = def.spawnInterval;
  spawnTimer = 0.6;
  totalEnemies = spawnQueue.length;
  killedEnemies = 0;
  enemies = []; bullets = []; particles = []; flashes = [];
}

function startGame() {
  level = 1; score = 0;
  player = createPlayer();
  loadLevel(1);
  gs = 'PLAYING';
}

// ── UPDATE ─────────────────────────────────────────────────────────────────
function update(dt) {
  if (shakeTimer > 0) shakeTimer -= dt;

  if (gs === 'LEVEL_COMPLETE') {
    completionTimer -= dt;
    updateParticles(dt);
    if (completionTimer <= 0) {
      if (level >= 3) { gs = 'WIN'; hiScore = Math.max(hiScore, score); }
      else { level++; player.x = W/2; player.y = H/2; player.invTimer = 1; loadLevel(level); gs = 'PLAYING'; }
    }
    return;
  }
  if (gs !== 'PLAYING') return;

  updatePlayer(dt);
  if (gs !== 'PLAYING') return;
  updateEnemies(dt);
  if (gs !== 'PLAYING') return;
  updateBullets(dt);
  updateParticles(dt);
  updateFlashes(dt);
  checkSpawn(dt);
  checkLevelComplete();
}

function updatePlayer(dt) {
  const p = player;
  p.angle = Math.atan2(mouse.y - p.y, mouse.x - p.x);

  let dx = 0, dy = 0;
  if (keys['ArrowLeft']  || keys['a'] || keys['A']) dx--;
  if (keys['ArrowRight'] || keys['d'] || keys['D']) dx++;
  if (keys['ArrowUp']    || keys['w'] || keys['W']) dy--;
  if (keys['ArrowDown']  || keys['s'] || keys['S']) dy++;
  if (dx && dy) { dx *= 0.707; dy *= 0.707; }
  p.moving = !!(dx || dy);

  p.x = Math.max(PLAYER_R, Math.min(W-PLAYER_R, p.x + dx*PLAYER_SPEED*dt));
  p.y = Math.max(PLAYER_R, Math.min(H-PLAYER_R, p.y + dy*PLAYER_SPEED*dt));
  if (p.moving) p.walkCycle += dt * 9;

  if (p.invTimer > 0) p.invTimer -= dt;
  if (p.fireCooldown > 0) p.fireCooldown -= dt;
  if (mouseHeld && p.fireCooldown <= 0) fireBullet();
}

function updateEnemies(dt) {
  for (let i = enemies.length-1; i >= 0; i--) {
    const e = enemies[i];
    const dx = player.x - e.x, dy = player.y - e.y;
    const dist = Math.hypot(dx, dy);
    e.angle = Math.atan2(dy, dx);

    let speed = e.speed;
    if (e.type === 'charger') {
      if (dist < 160) e.charging = true;
      if (dist > 220) e.charging = false;
      if (e.charging) speed = 310;
    }

    if (dist > 0) { e.x += (dx/dist)*speed*dt; e.y += (dy/dist)*speed*dt; }
    e.walkCycle += dt * (speed / 50);

    // separation
    for (let j = 0; j < enemies.length; j++) {
      if (i === j) continue;
      const o = enemies[j];
      const sd = Math.hypot(e.x-o.x, e.y-o.y);
      const min = e.r + o.r + 2;
      if (sd < min && sd > 0) {
        const push = (min-sd)/sd * 0.5;
        e.x += (e.x-o.x)*push; e.y += (e.y-o.y)*push;
      }
    }

    if (e.hitTimer > 0) e.hitTimer -= dt;

    if (player.invTimer <= 0 && Math.hypot(e.x-player.x, e.y-player.y) < e.r+PLAYER_R) {
      player.hp--;
      player.invTimer = INV_TIME;
      shakeTimer = 0.2;
      if (player.hp <= 0) {
        burst(player.x, player.y, '#00e5ff', 22);
        gs = 'GAME_OVER';
        hiScore = Math.max(hiScore, score);
        return;
      }
    }
  }
}

function updateBullets(dt) {
  for (let i = bullets.length-1; i >= 0; i--) {
    const b = bullets[i];
    b.x += b.vx*dt; b.y += b.vy*dt; b.life -= dt;
    if (b.life <= 0 || b.x < -20 || b.x > W+20 || b.y < -20 || b.y > H+20) {
      bullets.splice(i, 1); continue;
    }
    let hit = false;
    for (let j = enemies.length-1; j >= 0; j--) {
      const e = enemies[j];
      if (Math.hypot(b.x-e.x, b.y-e.y) < b.r + e.r) {
        e.hp--; e.hitTimer = 0.1; hit = true;
        if (e.hp <= 0) {
          score += e.score; killedEnemies++;
          const col = {grunt:'#ff4444',charger:'#ff8800',tank:'#aa44ff'}[e.type];
          burst(e.x, e.y, col, e.type==='tank' ? 22 : 13);
          enemies.splice(j, 1);
        }
        break;
      }
    }
    if (hit) bullets.splice(i, 1);
  }
}

function updateParticles(dt) {
  for (let i = particles.length-1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx*dt; p.y += p.vy*dt;
    p.vx *= 0.91; p.vy *= 0.91;
    p.life -= dt;
    if (p.life <= 0) particles.splice(i, 1);
  }
}

function updateFlashes(dt) {
  for (let i = flashes.length-1; i >= 0; i--) {
    flashes[i].life -= dt;
    if (flashes[i].life <= 0) flashes.splice(i, 1);
  }
}

function checkSpawn(dt) {
  if (!spawnQueue.length) return;
  spawnTimer -= dt;
  if (spawnTimer <= 0 && enemies.length < maxOnScreen) {
    enemies.push(spawnEnemy(spawnQueue.pop()));
    spawnTimer = spawnInterval;
  }
}

function checkLevelComplete() {
  if (!spawnQueue.length && !enemies.length && killedEnemies >= totalEnemies) {
    gs = 'LEVEL_COMPLETE';
    completionTimer = COMPLETE_WAIT;
  }
}

// ── DRAW HELPERS ───────────────────────────────────────────────────────────
function drawBg() {
  ctx.fillStyle = '#080814';
  ctx.fillRect(0, 0, W, H);
  ctx.strokeStyle = 'rgba(255,255,255,0.035)';
  ctx.lineWidth = 1;
  for (let x = 0; x <= W; x += 40) { ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,H); ctx.stroke(); }
  for (let y = 0; y <= H; y += 40) { ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke(); }
}

function scanlines() { ctx.drawImage(scanOC, 0, 0); }

function pixelHeart(x, y, px, filled) {
  const c = filled ? '#ff2255' : '#441122';
  ctx.fillStyle = c;
  ctx.fillRect(x+px,   y,     px*2, px);
  ctx.fillRect(x+px*4, y,     px*2, px);
  ctx.fillRect(x,      y+px,  px*7, px*2);
  ctx.fillRect(x+px,   y+px*3,px*5, px);
  ctx.fillRect(x+px*2, y+px*4,px*3, px);
  ctx.fillRect(x+px*3, y+px*5,px,   px);
}

// ── DRAW ENTITIES ──────────────────────────────────────────────────────────
function drawPlayer() {
  const p = player;
  if (p.invTimer > 0 && Math.floor(p.invTimer*10)%2===0) return;

  ctx.save();
  ctx.translate(p.x, p.y);
  ctx.rotate(p.angle);

  // shadow
  ctx.save(); ctx.globalAlpha=0.22;
  ctx.fillStyle='#000'; ctx.beginPath(); ctx.ellipse(3,3,15,10,0,0,Math.PI*2); ctx.fill();
  ctx.restore();

  // legs (perpendicular to facing direction)
  const ls = Math.sin(p.walkCycle)*7;
  ctx.fillStyle = '#006699';
  ctx.beginPath(); ctx.ellipse(-5,-9+ls,4,7,0,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(-5, 9-ls,4,7,0,0,Math.PI*2); ctx.fill();

  // body glow
  const grd = ctx.createRadialGradient(0,0,2,0,0,PLAYER_R);
  grd.addColorStop(0,'#80ffff'); grd.addColorStop(1,'#00a8c8');
  ctx.beginPath(); ctx.arc(0,0,PLAYER_R,0,Math.PI*2);
  ctx.fillStyle = grd; ctx.fill();
  ctx.strokeStyle='#00e5ff'; ctx.lineWidth=2; ctx.stroke();

  // gun body
  ctx.fillStyle='#555'; ctx.fillRect(3,-4,20,8);
  ctx.fillStyle='#777'; ctx.fillRect(19,-3,8,6);
  ctx.strokeStyle='#999'; ctx.lineWidth=1; ctx.strokeRect(3,-4,20,8);
  // muzzle tip
  ctx.fillStyle='#aaa'; ctx.fillRect(24,-2,5,4);

  // eyes
  ctx.fillStyle='#001a2e';
  ctx.beginPath(); ctx.arc(6,-5,3,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(6, 5,3,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#00ffff';
  ctx.beginPath(); ctx.arc(7,-5,1.4,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(7, 5,1.4,0,Math.PI*2); ctx.fill();

  ctx.restore();
}

function drawEnemy(e) {
  ctx.save();
  ctx.translate(e.x, e.y);
  const flash = e.hitTimer > 0;

  if (e.type === 'grunt') {
    ctx.rotate(e.angle);
    const wb = Math.sin(e.walkCycle)*2;
    ctx.translate(0, wb);

    // shadow
    ctx.save(); ctx.globalAlpha=0.18;
    ctx.fillStyle='#000'; ctx.beginPath(); ctx.ellipse(2,2,13,9,0,0,Math.PI*2); ctx.fill();
    ctx.restore();

    ctx.fillStyle = flash ? '#fff' : '#cc2200';
    ctx.beginPath(); ctx.arc(0,0,GRUNT_R,0,Math.PI*2); ctx.fill();
    ctx.strokeStyle = flash ? '#ffaaaa' : '#ff5544'; ctx.lineWidth=2; ctx.stroke();

    // eyes
    ctx.fillStyle='#fff';
    ctx.beginPath(); ctx.arc(5,-4,3,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(5, 4,3,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#ff0000';
    ctx.beginPath(); ctx.arc(6,-4,1.5,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(6, 4,1.5,0,Math.PI*2); ctx.fill();
    // menace line
    ctx.strokeStyle='#ff8866'; ctx.lineWidth=1.5;
    ctx.beginPath(); ctx.arc(4,0,4,0.2,Math.PI-0.2); ctx.stroke();

  } else if (e.type === 'charger') {
    ctx.rotate(e.angle);

    ctx.save(); ctx.globalAlpha=0.18;
    ctx.fillStyle='#000'; ctx.beginPath(); ctx.ellipse(2,2,12,8,0,0,Math.PI*2); ctx.fill();
    ctx.restore();

    ctx.fillStyle = flash ? '#fff' : (e.charging ? '#ffaa00' : '#ff6600');
    ctx.beginPath(); ctx.moveTo(14,0); ctx.lineTo(-10,-10); ctx.lineTo(-10,10); ctx.closePath(); ctx.fill();
    ctx.strokeStyle = e.charging ? '#ffee00' : '#ffaa33'; ctx.lineWidth=2; ctx.stroke();

    ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(4,0,3.5,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#ff6600'; ctx.beginPath(); ctx.arc(5,0,2,0,Math.PI*2); ctx.fill();

    if (e.charging) {
      ctx.strokeStyle='rgba(255,200,0,0.5)'; ctx.lineWidth=1.5;
      [-5,0,5].forEach(off => {
        ctx.beginPath(); ctx.moveTo(-10,off); ctx.lineTo(-22,off); ctx.stroke();
      });
    }

  } else { // tank
    ctx.save(); ctx.globalAlpha=0.18;
    ctx.fillStyle='#000'; ctx.beginPath(); ctx.ellipse(3,3,20,14,0,0,Math.PI*2); ctx.fill();
    ctx.restore();

    // body
    ctx.fillStyle = flash ? '#fff' : '#7722cc';
    ctx.fillRect(-TANK_R,-TANK_R,TANK_R*2,TANK_R*2);
    ctx.strokeStyle = flash ? '#ddaaff' : '#aa44ff'; ctx.lineWidth=3;
    ctx.strokeRect(-TANK_R,-TANK_R,TANK_R*2,TANK_R*2);

    // rivets
    ctx.fillStyle='#553399';
    [[-14,-14],[-14,14],[14,-14],[14,14]].forEach(([rx,ry]) => {
      ctx.beginPath(); ctx.arc(rx,ry,3,0,Math.PI*2); ctx.fill();
    });

    // turret (rotates to face player)
    ctx.save();
    ctx.rotate(e.angle);
    ctx.fillStyle='#553399'; ctx.fillRect(0,-5,24,10);
    ctx.strokeStyle='#aa44ff'; ctx.lineWidth=2; ctx.strokeRect(0,-5,24,10);
    ctx.fillStyle='#888'; ctx.fillRect(20,-3.5,8,7);
    ctx.restore();

    // hp bar
    const bw=36, bh=5, bx=-18, by=TANK_R+6;
    ctx.fillStyle='#220033'; ctx.fillRect(bx,by,bw,bh);
    ctx.fillStyle='#aa44ff'; ctx.fillRect(bx,by,bw*(e.hp/e.maxHp),bh);
    ctx.strokeStyle='#cc66ff'; ctx.lineWidth=1; ctx.strokeRect(bx,by,bw,bh);
  }
  ctx.restore();
}

function drawBullets() {
  for (const b of bullets) {
    const a = Math.atan2(b.vy, b.vx);
    const tl = 18;
    const grd = ctx.createLinearGradient(b.x,b.y,b.x-Math.cos(a)*tl,b.y-Math.sin(a)*tl);
    grd.addColorStop(0,'rgba(255,240,80,0.9)'); grd.addColorStop(1,'rgba(255,240,80,0)');
    ctx.save(); ctx.globalAlpha=0.6;
    ctx.strokeStyle=grd; ctx.lineWidth=3;
    ctx.beginPath(); ctx.moveTo(b.x,b.y); ctx.lineTo(b.x-Math.cos(a)*tl,b.y-Math.sin(a)*tl); ctx.stroke();
    ctx.restore();

    ctx.save();
    ctx.fillStyle='#fff8a0'; ctx.shadowColor='#ffee00'; ctx.shadowBlur=8;
    ctx.beginPath(); ctx.arc(b.x,b.y,BULLET_R,0,Math.PI*2); ctx.fill();
    ctx.restore();
  }
}

function drawFlashes() {
  for (const f of flashes) {
    ctx.save();
    ctx.globalAlpha = f.life / 0.07;
    ctx.fillStyle='#ffffbb'; ctx.shadowColor='#ffff00'; ctx.shadowBlur=22;
    ctx.beginPath(); ctx.arc(f.x,f.y,11,0,Math.PI*2); ctx.fill();
    ctx.restore();
  }
}

function drawParticles() {
  for (const p of particles) {
    ctx.save();
    ctx.globalAlpha = Math.max(0, p.life/p.maxLife);
    ctx.fillStyle=p.color; ctx.shadowColor=p.color; ctx.shadowBlur=4;
    ctx.fillRect(p.x-p.r/2, p.y-p.r/2, p.r, p.r);
    ctx.restore();
  }
}

function drawHUD() {
  // Hearts
  for (let i = 0; i < player.maxHp; i++) {
    pixelHeart(16 + i*34, 14, 3, i < player.hp);
  }
  // Score
  ctx.save();
  ctx.fillStyle='#00e5ff'; ctx.font='bold 20px monospace'; ctx.textAlign='right';
  ctx.fillText('SCORE: '+score, W-16, 36);
  // Level indicator
  ctx.textAlign='center'; ctx.fillStyle='#ffee00';
  ctx.fillText('LEVEL '+level, W/2, 36);
  // Enemies remaining
  const rem = spawnQueue.length + enemies.length;
  ctx.fillStyle='#ff6644'; ctx.font='15px monospace';
  ctx.fillText('ENEMIES: '+rem, W/2, H-16);
  ctx.restore();
}

// ── SCREENS ────────────────────────────────────────────────────────────────
function drawMenu() {
  drawBg();
  ctx.save();
  ctx.textAlign='center';

  ctx.fillStyle='#1a4a6a'; ctx.font='16px monospace';
  ctx.fillText('▸ TOP-DOWN SHOOTER ◂', W/2, H/2-110);

  ctx.shadowColor='#00e5ff'; ctx.shadowBlur=28;
  ctx.fillStyle='#ffffff'; ctx.font='bold 76px monospace';
  ctx.fillText('SURVIVOR', W/2, H/2-35);
  ctx.shadowBlur=0;

  ctx.fillStyle='#667788'; ctx.font='14px monospace';
  ctx.fillText('ARROWS / WASD  →  MOVE', W/2, H/2+22);
  ctx.fillText('MOUSE  →  AIM        CLICK / HOLD  →  SHOOT', W/2, H/2+46);

  // Play button
  const bx=W/2-95, by=H/2+76, bw=190, bh=52;
  ctx.fillStyle='#00e5ff'; ctx.fillRect(bx,by,bw,bh);
  ctx.fillStyle='#000'; ctx.font='bold 26px monospace'; ctx.shadowBlur=0;
  ctx.fillText('▶  PLAY', W/2, by+36);

  if (hiScore > 0) {
    ctx.fillStyle='#ffee00'; ctx.font='15px monospace';
    ctx.fillText('HI-SCORE: '+hiScore, W/2, by+80);
  }
  ctx.restore();
  scanlines();
}

function drawGameOver() {
  drawBg();
  drawParticles();
  ctx.save();
  ctx.textAlign='center';
  ctx.shadowColor='#ff3333'; ctx.shadowBlur=35;
  ctx.fillStyle='#ff4444'; ctx.font='bold 68px monospace';
  ctx.fillText('GAME OVER', W/2, H/2-40);
  ctx.shadowBlur=0;
  ctx.fillStyle='#00e5ff'; ctx.font='24px monospace';
  ctx.fillText('SCORE: '+score, W/2, H/2+18);

  const bx=W/2-105, by=H/2+56, bw=210, bh=52;
  ctx.fillStyle='#cc2222'; ctx.fillRect(bx,by,bw,bh);
  ctx.fillStyle='#fff'; ctx.font='bold 24px monospace';
  ctx.fillText('↺  RETRY', W/2, by+36);
  ctx.restore();
  scanlines();
}

function drawWin() {
  drawBg();
  drawParticles();
  ctx.save();
  ctx.textAlign='center';
  ctx.shadowColor='#ffee00'; ctx.shadowBlur=30;
  ctx.fillStyle='#ffee00'; ctx.font='bold 62px monospace';
  ctx.fillText('YOU WIN!', W/2, H/2-60);
  ctx.shadowBlur=0;
  ctx.fillStyle='#fff'; ctx.font='22px monospace';
  ctx.fillText('FINAL SCORE: '+score, W/2, H/2-8);
  ctx.fillStyle='#00e5ff'; ctx.font='16px monospace';
  ctx.fillText('All 3 levels cleared — nice work!', W/2, H/2+24);

  const bx=W/2-115, by=H/2+58, bw=230, bh=52;
  ctx.fillStyle='#ccbb00'; ctx.fillRect(bx,by,bw,bh);
  ctx.fillStyle='#000'; ctx.font='bold 22px monospace';
  ctx.fillText('▶  PLAY AGAIN', W/2, by+36);
  ctx.restore();
  scanlines();
}

// ── MAIN LOOP ──────────────────────────────────────────────────────────────
let lastTs = 0;

function loop(ts) {
  const dt = lastTs ? Math.min((ts-lastTs)/1000, 0.05) : 0;
  lastTs = ts;

  update(dt);

  if (gs === 'MENU')      { drawMenu(); }
  else if (gs === 'GAME_OVER') { drawGameOver(); }
  else if (gs === 'WIN')  { drawWin(); }
  else {
    // Apply camera shake
    const sx = shakeTimer > 0 ? (Math.random()-.5)*14 : 0;
    const sy = shakeTimer > 0 ? (Math.random()-.5)*14 : 0;
    ctx.save();
    if (shakeTimer > 0) ctx.translate(sx, sy);

    drawBg();
    drawParticles();
    for (const e of enemies) drawEnemy(e);
    drawBullets();
    drawFlashes();
    if (gs === 'PLAYING' || gs === 'LEVEL_COMPLETE') drawPlayer();
    drawHUD();

    if (gs === 'LEVEL_COMPLETE') {
      ctx.save(); ctx.textAlign='center';
      ctx.shadowColor='#ffee00'; ctx.shadowBlur=20;
      ctx.fillStyle='#ffee00'; ctx.font='bold 54px monospace';
      ctx.fillText('LEVEL COMPLETE!', W/2, H/2-10);
      ctx.shadowBlur=0;
      ctx.fillStyle='#00e5ff'; ctx.font='20px monospace';
      ctx.fillText('SCORE: '+score, W/2, H/2+38);
      if (level < 3) {
        ctx.fillStyle='#888'; ctx.font='15px monospace';
        ctx.fillText('LEVEL '+(level+1)+' IN '+Math.ceil(completionTimer)+'...', W/2, H/2+68);
      } else {
        ctx.fillStyle='#ffee00'; ctx.font='15px monospace';
        ctx.fillText('VICTORY INCOMING...', W/2, H/2+68);
      }
      ctx.restore();
    }

    ctx.restore(); // end shake
    scanlines();
  }

  requestAnimationFrame(loop);
}

// ── INPUT ──────────────────────────────────────────────────────────────────
function canvasMouse(e) {
  const r = canvas.getBoundingClientRect();
  return {
    x: (e.clientX - r.left) * (W / r.width),
    y: (e.clientY - r.top)  * (H / r.height)
  };
}

canvas.addEventListener('mousemove', e => {
  const m = canvasMouse(e); mouse.x = m.x; mouse.y = m.y;
});

canvas.addEventListener('mousedown', e => {
  const m = canvasMouse(e);
  mouseHeld = true;
  if (gs === 'PLAYING') { fireBullet(); return; }

  const btnHit = (bx, by, bw, bh) => m.x>=bx && m.x<=bx+bw && m.y>=by && m.y<=by+bh;
  if (gs === 'MENU'      && btnHit(W/2-95,  H/2+76,  190, 52)) startGame();
  if (gs === 'GAME_OVER' && btnHit(W/2-105, H/2+56,  210, 52)) startGame();
  if (gs === 'WIN'       && btnHit(W/2-115, H/2+58,  230, 52)) startGame();
});

canvas.addEventListener('mouseup',   () => { mouseHeld = false; });
canvas.addEventListener('mouseleave',() => { mouseHeld = false; });

document.addEventListener('keydown', e => {
  keys[e.key] = true;
  if (e.key === ' ')     { e.preventDefault(); if (gs==='PLAYING') fireBullet(); }
  if (e.key === 'Enter') { if (gs==='MENU'||gs==='GAME_OVER'||gs==='WIN') startGame(); }
});
document.addEventListener('keyup', e => { keys[e.key] = false; });

// ── START ──────────────────────────────────────────────────────────────────
requestAnimationFrame(loop);
</script>
</body>
</html>
