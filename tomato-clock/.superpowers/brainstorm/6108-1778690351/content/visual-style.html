<h2>番茄钟的视觉风格？</h2>
<p class="subtitle">选择一个整体设计方向</p>

<div class="cards">

  <div class="card" data-choice="minimal" onclick="toggleSelect(this)">
    <div class="card-image">
      <div style="background:#1a1a2e;border-radius:12px;padding:24px;text-align:center;font-family:sans-serif;">
        <div style="color:#e94560;font-size:13px;letter-spacing:3px;margin-bottom:8px;">专注模式</div>
        <div style="color:#fff;font-size:48px;font-weight:200;letter-spacing:4px;margin-bottom:16px;">25:00</div>
        <div style="display:flex;gap:8px;justify-content:center;">
          <div style="background:#e94560;color:#fff;border-radius:6px;padding:8px 20px;font-size:13px;">开始</div>
          <div style="background:#333;color:#999;border-radius:6px;padding:8px 20px;font-size:13px;">重置</div>
        </div>
        <div style="margin-top:16px;color:#555;font-size:11px;">第 1 / 4 个番茄</div>
      </div>
    </div>
    <div class="card-body">
      <h3>A · 极简深色</h3>
      <p>深色背景，大字计时，红色强调色。专注、干净、不干扰。</p>
    </div>
  </div>

  <div class="card" data-choice="warm" onclick="toggleSelect(this)">
    <div class="card-image">
      <div style="background:#fff8f5;border-radius:12px;padding:24px;text-align:center;font-family:sans-serif;border:1px solid #f0d9d0;">
        <div style="color:#c0392b;font-size:13px;letter-spacing:2px;margin-bottom:8px;">🍅 专注中</div>
        <div style="color:#2c1810;font-size:48px;font-weight:300;margin-bottom:8px;">25:00</div>
        <div style="background:#f0d9d0;border-radius:50%;width:120px;height:120px;margin:0 auto 16px;display:flex;align-items:center;justify-content:center;">
          <div style="color:#c0392b;font-size:36px;font-weight:300;">25:00</div>
        </div>
        <div style="background:#c0392b;color:#fff;border-radius:20px;padding:10px 30px;display:inline-block;font-size:14px;">▶ 开始专注</div>
      </div>
    </div>
    <div class="card-body">
      <h3>B · 温暖番茄风</h3>
      <p>米白底色，圆形进度，暖红配色。有番茄的感觉，温馨友好。</p>
    </div>
  </div>

  <div class="card" data-choice="modern" onclick="toggleSelect(this)">
    <div class="card-image">
      <div style="background:linear-gradient(135deg,#667eea,#764ba2);border-radius:12px;padding:24px;text-align:center;font-family:sans-serif;">
        <div style="color:rgba(255,255,255,0.7);font-size:12px;letter-spacing:3px;margin-bottom:4px;">FOCUS</div>
        <div style="color:#fff;font-size:52px;font-weight:100;margin-bottom:12px;">25:00</div>
        <div style="background:rgba(255,255,255,0.15);border-radius:100px;height:4px;margin-bottom:16px;">
          <div style="background:#fff;border-radius:100px;height:4px;width:0%"></div>
        </div>
        <div style="display:flex;gap:12px;justify-content:center;">
          <div style="background:rgba(255,255,255,0.2);color:#fff;border-radius:8px;padding:8px 24px;font-size:13px;backdrop-filter:blur(10px);">▶ Start</div>
        </div>
      </div>
    </div>
    <div class="card-body">
      <h3>C · 现代渐变</h3>
      <p>紫蓝渐变，毛玻璃元素，进度条。现代感强，有设计感。</p>
    </div>
  </div>

</div>
